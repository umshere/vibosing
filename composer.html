<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBosing — Composer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #ffffff;
  --surface: #fafafa;
  --surface2: #f5f5f7;
  --border: #e8e8ec;
  --text: #1a1a2e;
  --text-2: #6b6b80;
  --text-3: #9898a8;
  --accent: #5e6ad2;
  --accent-light: #eef0ff;
  --drop: #e5484d;
  --peak: #30a46c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.logo { font-size: 13px; font-weight: 600; text-decoration: none; color: var(--text); }
.logo span { color: var(--accent); }
.status { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
.status-dot.on { background: var(--peak); }
.nav-right { display: flex; gap: 8px; }
.btn { font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.12s; }
.btn:hover { border-color: #ccc; color: var(--text); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-accent:hover { opacity: 0.9; color: #fff; }

.main { display: flex; flex: 1; overflow: hidden; }
.editor { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Video */
.video-wrap { flex: 1; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
.drop-zone { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
.drop-icon { width: 48px; height: 48px; border: 1.5px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-3); transition: border-color 0.15s; }
.drop-zone:hover .drop-icon { border-color: var(--accent); color: var(--accent); }
.drop-label { font-size: 13px; color: var(--text-3); }
.drop-label strong { color: var(--accent); font-weight: 500; }
#file-input { display: none; }
#video-el { max-width: 100%; max-height: 100%; display: none; }
.now-playing { position: absolute; top: 10px; left: 10px; display: none; align-items: center; gap: 6px; background: rgba(255,255,255,0.92); border: 1px solid var(--border); padding: 4px 10px; border-radius: 5px; pointer-events: none; font-size: 11px; font-weight: 500; color: var(--text-2); }
.np-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Transport */
.transport { display: flex; align-items: center; gap: 10px; padding: 6px 16px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.t-btn { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 13px; padding: 4px; }
.t-btn:hover { color: var(--text); }
.play-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.t-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); }
.t-time b { color: var(--text); font-weight: 500; }
.vol-label { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); }

/* Timeline */
.timeline { flex-shrink: 0; height: 170px; border-top: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
.tl-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tl-title { font-size: 11px; font-weight: 500; color: var(--text-2); }
.tl-legend { display: flex; gap: 12px; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-3); }
.leg-dot { width: 8px; height: 3px; border-radius: 1px; }
.tl-body { flex: 1; position: relative; overflow: hidden; }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#auto-cv { z-index: 3; }
#wave-cv { z-index: 2; }
#region-cv { z-index: 1; }
#interact-cv { z-index: 5; cursor: pointer; }
#playhead { position: absolute; top: 0; width: 1px; height: 100%; background: var(--accent); pointer-events: none; z-index: 10; left: 0; }
#playhead::before { content: ''; position: absolute; top: -1px; left: -4px; width: 9px; height: 6px; background: var(--accent); clip-path: polygon(0 0,100% 0,50% 100%); }

/* Sidebar */
.sidebar { width: 300px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.sb-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.sb-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sb-content { flex: 1; overflow-y: auto; }

/* Transcript */
.tr-seg { display: flex; gap: 8px; padding: 5px 12px; font-size: 11px; line-height: 1.55; cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent; }
.tr-seg:hover { background: var(--surface2); }
.tr-seg.active { background: var(--accent-light); border-left-color: var(--accent); }
.tr-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); flex-shrink: 0; width: 32px; padding-top: 1px; }
.tr-text { color: var(--text-2); }
.tr-seg.active .tr-text { color: var(--text); }

/* Cue detail */
.cue-detail { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.sb-badge { width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; }
.sb-title { font-size: 13px; font-weight: 600; }
.sb-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); }
.pill { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: var(--accent-light); color: var(--accent); }
.label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
.text-sm { font-size: 12px; line-height: 1.6; color: var(--text-2); }
.text-em { font-size: 12px; line-height: 1.6; color: var(--text); font-style: italic; }
.prompt-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
.prompt-box textarea { width: 100%; background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.7; color: var(--text); resize: vertical; outline: none; min-height: 80px; }
.copy-btn { font-size: 10px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--text-3); cursor: pointer; }
.copy-btn:hover { color: var(--text); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">VIB<span>osing</span></a>
  <div class="status"><div class="status-dot" id="srv-dot"></div><span id="srv-status">Checking...</span></div>
  <div class="nav-right">
    <button class="btn" onclick="exportJSON()">Export</button>
    <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">Load Video</button>
  </div>
</nav>

<div class="main">
  <div class="editor">
    <div class="video-wrap" id="drop-area">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">+</div>
        <div class="drop-label"><strong>Drop video</strong> or click to browse</div>
      </div>
      <video id="video-el"></video>
      <div class="now-playing" id="np"><div class="np-dot" id="np-dot"></div><span id="np-text"></span></div>
      <input type="file" id="file-input" accept="video/*">
    </div>

    <div class="transport">
      <button class="t-btn" onclick="skipBy(-10)">&#9664;&#9664;</button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <button class="t-btn" onclick="skipBy(10)">&#9654;&#9654;</button>
      <div class="t-time"><b id="t-cur">0:00</b> / <span id="t-tot">0:00</span></div>
      <div class="vol-label" id="vol-label">Vol: —</div>
    </div>

    <div class="timeline">
      <div class="tl-header">
        <div class="tl-title">Timeline</div>
        <div class="tl-legend">
          <div class="leg"><div class="leg-dot" style="background:var(--accent);opacity:0.5"></div>Volume</div>
          <div class="leg"><div class="leg-dot" style="background:var(--drop)"></div>Drop</div>
          <div class="leg"><div class="leg-dot" style="background:var(--peak)"></div>Peak</div>
          <div class="leg"><div class="leg-dot" style="background:var(--border)"></div>Shot</div>
        </div>
      </div>
      <div class="tl-body" id="tl-body">
        <canvas id="region-cv"></canvas>
        <canvas id="wave-cv"></canvas>
        <canvas id="auto-cv"></canvas>
        <canvas id="interact-cv"></canvas>
        <div id="playhead"></div>
      </div>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab active" onclick="switchTab('transcript')">Transcript</div>
      <div class="sb-tab" onclick="switchTab('cues')">Cues</div>
    </div>
    <div class="sb-content" id="sb-content"></div>
  </div>
</div>

<script>
const CUE_DATA=[
  {cue:1,start:"0:00",end:"0:49",name:"Cold Open",color:"#7c6bc4",mood:"tension + intrigue",snippet:"We're basically about to solve the greatest detective story ever told...",beat:"Cold open. 7-million-year cold case. Every person on earth is African.",prompt:"Dark cinematic opener. Sub-bass drone with kalimba motif. Sparse piano stabs. 60 BPM. Atmospheric."},
  {cue:2,start:"0:50",end:"1:51",name:"DNA Forensics",color:"#5b8a9a",mood:"analytical",snippet:"The proof is written in tiny spelling mistakes...",beat:"DNA as evidence. Molecular clock introduced.",prompt:"Ticking clock texture. Woodblock pulse 72 BPM. Sub-bass drone. Cold, precise."},
  {cue:3,start:"1:52",end:"2:50",name:"The Clock",color:"#4a9a8e",mood:"mounting tension",snippet:"The clock isn't a Swiss watch...",beat:"Scientists hunt for a ghost ancestor.",prompt:"Heartbeat bass pulse 65 BPM. Low strings, unresolved suspensions. Building."},
  {cue:4,start:"2:51",end:"4:03",name:"Toumai Found",color:"#c8932a",mood:"revelation",snippet:"They found something that changed everything. A skull.",beat:"THE CENTREPIECE. DROP at 3:13, then African texture.",prompt:"Silence then drum hit. Duduk melody. Djembe. Ancient. 55 BPM."},
  {cue:5,start:"4:04",end:"5:35",name:"Family Album",color:"#b86c3a",mood:"warmth",snippet:"Lucy was found in Ethiopia in '74...",beat:"Lucy to Homo habilis. Music nearly invisible.",prompt:"Kora harp, sparse. Light string pad. Minimum density. 65 BPM."},
  {cue:6,start:"5:36",end:"7:32",name:"Verdict",color:"#a84050",mood:"resolve",snippet:"Every good detective story has a twist...",beat:"Java Man twist. Darwin vindication. Africa: case closed.",prompt:"Pizzicato, slight dissonance. Builds to kora + heartbeat."},
  {cue:7,start:"7:33",end:"8:06",name:"Resolution",color:"#6a9a5a",mood:"profound",snippet:"One story. One shared family tree...",beat:"THE PEAK. Everything saved for these 33 seconds.",prompt:"Full palette. Kalimba + cello + kora. Warm. 55 BPM. Fades to kalimba alone."}
];
const SHOTS=[19.96,45.29,64,79.62,112.46,138.42,155.46,168.5,175.17,193.92,211.58,243.96,256.67,280.17,302.75,325.38,349.88,366.92,382.54,413.25,424.42,445.54,453.46,464.54,483.83];
const AUTO_KF=[[0,.80],[3,.70],[5,.22],[6,.22],[19,.22],[20,.10],[21.5,.10],[22,.20],[23,.20],[43,.22],[48,.22],[49,.32],[50,.20],[51,.20],[61,.20],[76,.24],[79,.20],[96,.22],[99,.20],[111,.30],[112,.20],[138,.22],[145,.24],[155,.26],[165,.28],[168,.30],[170,.28],[181,.28],[190,.30],[192.5,.30],[193,0],[194.5,0],[195,.06],[197,.18],[198,.25],[205,.30],[210,.30],[219,.28],[225,.30],[235,.32],[240,.25],[244,.22],[266,.22],[274,.22],[290,.22],[295,.25],[300,.28],[310,.30],[321,.32],[325,.34],[330,.35],[335,.35],[336,.35],[342,.32],[349,.32],[355,.30],[362,.32],[366,.30],[380,.28],[390,.25],[399,.25],[413,.28],[424,.30],[430,.32],[438,.32],[440,.30],[441,.25],[442,.10],[443,.10],[444,.15],[445,.22],[448,.28],[453,.35],[455,.40],[457,.45],[462,.50],[464,.30],[468,.50],[470,.28],[472,.22],[475,.45],[477,.32],[479,.55],[480,.50],[483,.65],[484,.68],[485,.65],[486,.55],[488,.40],[490,.20]];

function pt(s){const[m,n]=s.split(':').map(Number);return m*60+n;}
function fmt(s){return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;}
function volAt(t){for(let i=1;i<AUTO_KF.length;i++){if(t<=AUTO_KF[i][0]){const[t0,v0]=AUTO_KF[i-1],[t1,v1]=AUTO_KF[i];return v0+(v1-v0)*((t-t0)/(t1-t0));}}return AUTO_KF[AUTO_KF.length-1][1];}

const cues=CUE_DATA.map(c=>({...c,s:pt(c.start),e:pt(c.end)}));
let totalDur=486.37,loaded=false,aCue=-1,wfD=null,drag=false,TRANSCRIPT=[],curTab='transcript';

const $=id=>document.getElementById(id);
const video=$('video-el'),tlBody=$('tl-body'),playhead=$('playhead');

// File
$('drop-area').addEventListener('dragover',e=>e.preventDefault());
$('drop-area').addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadV(f);});
$('file-input').addEventListener('change',()=>{if($('file-input').files[0])loadV($('file-input').files[0]);});
function loadV(f){video.src=URL.createObjectURL(f);video.style.display='block';$('drop-zone').style.display='none';$('np').style.display='flex';video.load();}
video.addEventListener('loadedmetadata',()=>{totalDur=video.duration;$('t-tot').textContent=fmt(totalDur);loaded=true;resize();extractWf();});

function resize(){const W=tlBody.clientWidth,H=tlBody.clientHeight;['region-cv','wave-cv','auto-cv','interact-cv'].forEach(id=>{const c=$(id);c.width=W;c.height=H;});drawAll();}
window.addEventListener('resize',resize);
function drawAll(){drawR();drawW();drawA();}

function drawR(){
  const ctx=$('region-cv').getContext('2d'),W=ctx.canvas.width,H=ctx.canvas.height;ctx.clearRect(0,0,W,H);
  cues.forEach((c,i)=>{const x1=(c.s/totalDur)*W,x2=(c.e/totalDur)*W;ctx.globalAlpha=i===aCue?0.12:0.05;ctx.fillStyle=c.color;ctx.fillRect(x1,0,x2-x1,H);ctx.globalAlpha=i===aCue?0.7:0.25;ctx.fillRect(x1,0,x2-x1,2);ctx.globalAlpha=0.45;ctx.font='500 9px Inter';if(x2-x1>35)ctx.fillText(c.name,x1+5,13);});ctx.globalAlpha=1;
}
async function extractWf(){
  try{const ac=new AudioContext(),buf=await(await fetch(video.src)).arrayBuffer(),dec=await ac.decodeAudioData(buf),raw=dec.getChannelData(0),W=$('wave-cv').width,step=Math.floor(raw.length/W);wfD=new Float32Array(W);for(let i=0;i<W;i++){let mx=0;for(let j=0;j<step;j++){const v=Math.abs(raw[i*step+j]||0);if(v>mx)mx=v;}wfD[i]=mx;}drawW();}
  catch(e){wfD=new Float32Array($('wave-cv').width).fill(0).map((_,i)=>0.15+0.15*Math.sin(i*0.06));drawW();}
}
function drawW(){
  if(!wfD)return;const ctx=$('wave-cv').getContext('2d'),W=ctx.canvas.width,H=ctx.canvas.height;ctx.clearRect(0,0,W,H);
  for(let x=0;x<W;x++){const v=wfD[x]||0,bh=Math.max(1,v*H*0.55),y=(H-bh)/2,t=(x/W)*totalDur,ci=cues.findIndex(c=>t>=c.s&&t<c.e);ctx.fillStyle=ci>=0?cues[ci].color:'#ddd';ctx.globalAlpha=0.3;ctx.fillRect(x,y,1,bh);}ctx.globalAlpha=1;
}
function drawA(){
  const ctx=$('auto-cv').getContext('2d'),W=ctx.canvas.width,H=ctx.canvas.height;ctx.clearRect(0,0,W,H);
  const tX=t=>(t/totalDur)*W,vY=v=>H-(v*H*0.82)-H*0.06;
  // Fill
  ctx.beginPath();ctx.moveTo(0,H);AUTO_KF.forEach(([t,v])=>ctx.lineTo(tX(t),vY(v)));ctx.lineTo(W,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(94,106,210,0.12)');g.addColorStop(1,'rgba(94,106,210,0.01)');ctx.fillStyle=g;ctx.fill();
  // Line
  ctx.beginPath();AUTO_KF.forEach(([t,v],i)=>{i===0?ctx.moveTo(tX(t),vY(v)):ctx.lineTo(tX(t),vY(v));});ctx.strokeStyle='rgba(94,106,210,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  // Drops & peaks
  AUTO_KF.forEach(([t,v])=>{if(v===0||v>=0.6){const x=tX(t),y=vY(v);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=v===0?'var(--drop)':'var(--peak)';ctx.fill();}});
  // Shots
  SHOTS.forEach(t=>{const x=tX(t);ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;ctx.setLineDash([1,3]);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.setLineDash([]);});
  // Grid
  [.25,.5,.75].forEach(v=>{const y=vY(v);ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);});
  // Cursor
  if(loaded){const cx=tX(video.currentTime),cv=volAt(video.currentTime),cy=vY(cv);ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle='var(--accent)';ctx.fill();ctx.font='500 9px "JetBrains Mono"';ctx.fillStyle='var(--text-2)';ctx.fillText(`${Math.round(cv*100)}%`,cx+7,cy-3);}
}

// Playback
function togglePlay(){if(!loaded)return;if(video.paused){video.play();$('play-btn').innerHTML='&#10074;&#10074;';}else{video.pause();$('play-btn').innerHTML='&#9654;';}}
function skipBy(s){if(loaded)video.currentTime=Math.max(0,Math.min(totalDur,video.currentTime+s));}
video.addEventListener('ended',()=>$('play-btn').innerHTML='&#9654;');
video.addEventListener('timeupdate',()=>{
  if(!loaded)return;const t=video.currentTime;
  $('t-cur').textContent=fmt(t);
  $('vol-label').textContent=`Vol: ${Math.round(volAt(t)*100)}%`;
  playhead.style.left=((t/totalDur)*tlBody.clientWidth)+'px';
  const ci=cues.findIndex(c=>t>=c.s&&t<c.e);
  if(ci!==aCue){aCue=ci;drawR();if(ci>=0){$('np-dot').style.background=cues[ci].color;$('np-text').textContent=`${cues[ci].cue}. ${cues[ci].name}`;}}
  drawA();
  document.querySelectorAll('.tr-seg').forEach(el=>{const s=+el.dataset.start,e=+el.dataset.end,a=t>=s&&t<e;el.classList.toggle('active',a);if(a)el.scrollIntoView({block:'nearest',behavior:'smooth'});});
});

// Timeline scrub
$('interact-cv').addEventListener('mousedown',e=>{if(!loaded)return;drag=true;seekTo(e);});
document.addEventListener('mousemove',e=>{if(drag&&loaded)seekTo(e);});
document.addEventListener('mouseup',()=>drag=false);
function seekTo(e){const r=tlBody.getBoundingClientRect();video.currentTime=Math.max(0,Math.min(totalDur,((e.clientX-r.left)/r.width)*totalDur));}
$('interact-cv').addEventListener('click',e=>{if(!loaded)return;const r=tlBody.getBoundingClientRect(),t=((e.clientX-r.left)/r.width)*totalDur,ci=cues.findIndex(c=>t>=c.s&&t<c.e);if(ci>=0){switchTab('cues');openCue(ci);}});

// Sidebar tabs
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.sb-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase().includes(tab.substring(0,3))));
  if(tab==='transcript')renderTranscript();
  else renderCues();
}
function renderTranscript(){
  $('sb-content').innerHTML=TRANSCRIPT.map(s=>`<div class="tr-seg" data-start="${s.start}" data-end="${s.end}" onclick="if(loaded)video.currentTime=${s.start}"><div class="tr-time">${s.start_fmt}</div><div class="tr-text">${s.text}</div></div>`).join('')||'<div style="padding:16px;font-size:12px;color:var(--text-3)">Loading transcript...</div>';
}
function renderCues(){
  $('sb-content').innerHTML=cues.map((c,i)=>`<div style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''" onclick="openCue(${i});if(loaded)video.currentTime=${c.s}"><div style="display:flex;gap:8px;align-items:center"><div style="width:8px;height:8px;border-radius:2px;background:${c.color}"></div><span style="font-size:12px;font-weight:500">${c.name}</span><span style="font-size:10px;color:var(--text-3);margin-left:auto;font-family:'JetBrains Mono',monospace">${c.start}→${c.end}</span></div><div style="font-size:11px;color:var(--text-3);margin-top:3px">${c.mood}</div></div>`).join('');
}
function openCue(i){
  const c=cues[i];
  $('sb-content').innerHTML=`<div class="cue-detail">
    <div style="display:flex;gap:8px;align-items:center"><div class="sb-badge" style="background:${c.color}15;color:${c.color};border:1px solid ${c.color}30">${c.cue}</div><div><div class="sb-title">${c.name}</div><div class="sb-time">${c.start} → ${c.end}</div></div></div>
    <span class="pill">${c.mood}</span>
    <div><div class="label">Script</div><div class="text-sm">"${c.snippet}"</div></div>
    <div><div class="label">Director's Note</div><div class="text-em">${c.beat}</div></div>
    <div class="prompt-box"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div class="label" style="margin:0">Prompt</div><button class="copy-btn" onclick="navigator.clipboard.writeText(this.closest('.prompt-box').querySelector('textarea').value);this.textContent='Copied';setTimeout(()=>this.textContent='Copy',1500)">Copy</button></div><textarea>${c.prompt}</textarea></div>
    <button class="btn" style="width:100%" onclick="switchTab('cues')">Back to cues</button>
  </div>`;
}

function exportJSON(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({cues:CUE_DATA,automation:AUTO_KF,shots:SHOTS},null,2)]));a.download='score_data.json';a.click();
}

// Load transcript
fetch('http://localhost:5000/api/load/transcript.json').then(r=>r.json()).then(d=>{TRANSCRIPT=d.segments||[];renderTranscript();}).catch(()=>{});

// Server check
fetch('http://localhost:5000/api/status').then(r=>r.json()).then(d=>{$('srv-dot').classList.toggle('on',d.key_loaded);$('srv-status').textContent=d.key_loaded?'Connected':'No API key';}).catch(()=>{$('srv-status').textContent='Offline';});

// Init
(function(){resize();wfD=new Float32Array($('wave-cv').width).fill(0).map((_,i)=>0.15+0.13*Math.sin(i*0.06));drawAll();renderTranscript();})();
</script>
</body>
</html>
