<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Composer — The Missing Ancestor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0e;
    --surface: #111118;
    --surface2: #17171f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6f0;
    --text-dim: rgba(232,230,240,0.45);
    --accent: #c8a96e;
    --drop-color: #ff4466;
    --hook-color: #44ddaa;
    --hit-color: #ffcc44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { font-size: 12px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  .title-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 12px;
    border-radius: 4px; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-accent { background: var(--accent); color: #0a0a0e; border-color: var(--accent); font-weight: 600; }
  .btn-accent:hover { opacity: 0.85; color: #0a0a0e; }
  .btn-eleven { border-color: #6b4fa8; color: #b89fe0; background: transparent; }
  .btn-eleven:hover { background: rgba(107,79,168,0.15); color: #b89fe0; border-color: #6b4fa8; }

  /* legend pills */
  .legend { display: flex; gap: 10px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.05em; }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* ── Workspace ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }
  .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── Video ── */
  .video-area {
    flex: 1; background: #000; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; min-height: 0;
  }
  .drop-zone {
    display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; user-select: none;
  }
  .drop-icon {
    width: 60px; height: 60px; border: 2px dashed rgba(200,169,110,0.3); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.2s;
  }
  .drop-zone:hover .drop-icon { border-color: var(--accent); }
  .drop-label { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.7; }
  .drop-label strong { color: var(--accent); }
  #file-input { display: none; }
  #video-el { max-width: 100%; max-height: 100%; display: none; }

  .cue-overlay {
    position: absolute; top: 12px; left: 12px; display: none;
    align-items: center; gap: 7px;
    background: rgba(10,10,14,0.8); border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px); padding: 5px 10px; border-radius: 5px; pointer-events: none;
  }
  .cue-overlay-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cue-overlay-txt { font-family: 'JetBrains Mono', monospace; font-size: 10px; }

  /* ── Transport ── */
  .transport {
    display: flex; align-items: center; gap: 12px; padding: 7px 16px;
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .tbtn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; transition: color 0.15s; }
  .tbtn:hover { color: var(--text); }
  .play-btn {
    width: 32px; height: 32px; background: var(--accent); color: #0a0a0e;
    border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
  }
  .play-btn:hover { opacity: 0.82; }
  .t-display { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 105px; }
  .t-display span { color: var(--text); }
  .vol-row { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  input[type=range] { -webkit-appearance: none; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  #vol-range { width: 70px; }

  /* ── Timeline ── */
  .timeline-panel {
    background: var(--surface); border-top: 1px solid var(--border);
    flex-shrink: 0; height: 210px; position: relative;
  }

  /* tab bar */
  .tl-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 12px; height: 28px; align-items: flex-end;
  }
  .tl-tab {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.07em;
    text-transform: uppercase; padding: 4px 12px; cursor: pointer; color: var(--text-dim);
    border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none;
    margin-bottom: -1px;
  }
  .tl-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tracks-wrap { position: relative; height: 182px; overflow: hidden; }

  /* track rows */
  .track-row {
    position: absolute; left: 0; right: 0;
    display: flex; align-items: center;
  }
  .track-label {
    width: 80px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-dim); padding: 0 10px; border-right: 1px solid var(--border);
    height: 100%; display: flex; align-items: center;
  }
  .track-canvas-wrap { flex: 1; position: relative; height: 100%; overflow: hidden; }

  /* rows */
  .row-automation { top: 0; height: 70px; }
  .row-waveform   { top: 70px; height: 50px; border-top: 1px solid var(--border); }
  .row-thumbs     { top: 120px; height: 62px; border-top: 1px solid var(--border); }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* automation canvas is interactive */
  #auto-canvas { cursor: crosshair; }
  #cue-canvas { pointer-events: none; }

  /* thumb strip */
  #thumb-strip {
    position: absolute; inset: 0; display: flex; background: #07070e; overflow: hidden;
  }
  .thumb-frame {
    flex-shrink: 0; height: 100%; position: relative;
    border-right: 1px solid rgba(255,255,255,0.04); overflow: hidden; cursor: pointer;
  }
  .thumb-frame:hover { filter: brightness(1.3); }
  .thumb-frame canvas { width: 100%; height: 100%; display: block; }
  .thumb-time {
    position: absolute; bottom: 2px; left: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: rgba(255,255,255,0.45); text-shadow: 0 1px 3px #000; pointer-events: none;
  }

  /* playhead */
  #playhead {
    position: absolute; top: 0; width: 1px; height: 182px;
    background: rgba(255,255,255,0.9); pointer-events: none; z-index: 30; left: 80px;
    box-shadow: 0 0 6px rgba(255,255,255,0.3);
  }
  #playhead::before {
    content: ''; position: absolute; top: -1px; left: -4px;
    width: 9px; height: 7px; background: #fff;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }

  /* tooltip */
  #tooltip {
    position: fixed; background: rgba(10,10,14,0.95); border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px); padding: 7px 11px; border-radius: 5px;
    pointer-events: none; z-index: 200; display: none;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.55;
    max-width: 200px; color: var(--text);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 0; flex-shrink: 0; background: var(--surface2);
    border-left: 1px solid var(--border); overflow: hidden;
    transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.open { width: 360px; }
  .sidebar-inner {
    width: 360px; display: flex; flex-direction: column; height: 100%;
    overflow-y: auto; padding: 18px; gap: 15px;
  }
  .sb-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .sb-badge {
    width: 34px; height: 34px; border-radius: 7px; display: flex; align-items: center;
    justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    flex-shrink: 0;
  }
  .sb-title-block { flex: 1; }
  .sb-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .sb-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .close-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; transition: color 0.15s; }
  .close-btn:hover { color: var(--text); }
  .mood-pill {
    display: inline-flex; padding: 3px 9px; border-radius: 20px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  }
  .sl { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 5px; }
  .st { font-size: 12px; line-height: 1.65; color: rgba(232,230,240,0.72); }
  .st-em { font-size: 12px; line-height: 1.65; color: var(--text); font-style: italic; }
  .lyria-box { background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 7px; padding: 11px; }
  .lyria-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  textarea.lyria-ta {
    width: 100%; background: none; border: none; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.7;
    resize: vertical; outline: none; min-height: 110px;
  }
  .copy-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 9px;
    border-radius: 3px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .copy-btn.ok { color: #6fcf97; border-color: #6fcf97; }
  .dur-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .dur-fill { height: 100%; border-radius: 2px; }

  /* hit point marker style */
  .hit-legend { display: flex; flex-direction: column; gap: 4px; }
  .hit-row { display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); }
  .hit-icon { width: 12px; height: 12px; flex-shrink: 0; }

  /* ── Generation Panel ── */
  .gen-panel {
    width: 0; flex-shrink: 0; background: var(--surface2);
    border-left: 1px solid var(--border); overflow: hidden;
    transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .gen-panel.open { width: 420px; }
  .gen-panel-inner {
    width: 420px; padding: 20px; overflow-y: auto; height: 100%;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* Credit tracker */
  .credit-tracker {
    background: rgba(107,79,168,0.08); border: 1px solid rgba(107,79,168,0.25);
    border-radius: 7px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .credit-row {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
  }
  .credit-row input[type=number] {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(107,79,168,0.4);
    border-radius: 3px; color: #b89fe0; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 2px 6px; width: 70px; outline: none;
    -moz-appearance: textfield;
  }
  .credit-row input[type=number]::-webkit-inner-spin-button,
  .credit-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .credit-budget { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #b89fe0; }
  .credit-bar-wrap { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .credit-bar-used { height: 100%; background: #6b4fa8; border-radius: 2px; transition: width 0.2s; }

  /* Section headers */
  .gen-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--text-dim); padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Movement cards */
  .movement-card {
    background: var(--surface); border-radius: 7px; padding: 14px;
    border-left: 3px solid #6b4fa8; display: flex; flex-direction: column; gap: 9px;
  }
  .mv-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .mv-title { font-size: 12px; font-weight: 700; }
  .mv-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    padding: 2px 7px; border-radius: 3px; background: rgba(255,255,255,0.06);
    color: var(--text-dim); white-space: nowrap;
  }
  .mv-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); display: flex; gap: 12px; }
  .mv-cost { color: #b89fe0; }
  .mv-prompt-wrap { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 5px; padding: 9px; }
  .mv-prompt-wrap textarea {
    width: 100%; background: none; border: none; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.65;
    resize: vertical; outline: none; min-height: 90px;
  }
  .mv-actions { display: flex; gap: 8px; align-items: center; }
  .mark-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 9px;
    border-radius: 3px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s; margin-left: auto;
  }
  .mark-btn:hover { border-color: #6fcf97; color: #6fcf97; }
  .mark-btn.done { color: #6fcf97; border-color: #6fcf97; background: rgba(111,207,151,0.08); }

  /* Sting cards */
  .sting-card {
    background: var(--surface); border-radius: 5px; padding: 10px 12px;
    border-left: 3px solid #ff4466; display: flex; flex-direction: column; gap: 7px;
  }
  .sting-header { display: flex; align-items: center; gap: 8px; }
  .sting-time {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    color: #ff4466;
  }
  .sting-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); flex: 1; }
  .sting-prompt {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(232,230,240,0.65);
    line-height: 1.55;
  }

  /* Placement table */
  .placement-table-wrap { overflow-x: auto; }
  .placement-table {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
  }
  .placement-table th {
    text-align: left; padding: 6px 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border); font-weight: 400;
  }
  .placement-table td {
    padding: 6px 10px; color: rgba(232,230,240,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .placement-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .placement-table tr:hover td { background: rgba(255,255,255,0.04); }
  .pt-file { color: var(--text-dim); }
  .pt-vol { color: #b89fe0; }

  .gen-panel-close {
    display: flex; justify-content: space-between; align-items: center;
  }
  .gen-panel-heading {
    font-size: 12px; font-weight: 700; color: #b89fe0; letter-spacing: 0.05em;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Score Composer</div>
  <div class="title-tag">The Missing Ancestor · Director's View</div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--accent);opacity:0.7"></div>Volume curve</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--drop-color)"></div>DROP</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--hook-color)"></div>HOOK</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--hit-color)"></div>HIT POINT</div>
    <div class="leg-item"><div class="leg-dot" style="background:#334;border:1px solid #556"></div>DEEP DUCK</div>
  </div>
  <div class="header-right">
    <button class="btn btn-eleven" onclick="showPanel('generate')">ElevenLabs &#x2197;</button>
    <button class="btn" onclick="exportAll()">Export</button>
    <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">Load Video</button>
  </div>
</header>

<div class="workspace">
  <div class="main-panel">

    <div class="video-area" id="drop-area">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">&#9654;</div>
        <div class="drop-label"><strong>Drop your .mp4 here</strong><br>or click to browse</div>
      </div>
      <video id="video-el" preload="auto"></video>
      <div class="cue-overlay" id="cue-overlay">
        <div class="cue-overlay-dot" id="ov-dot"></div>
        <div class="cue-overlay-txt" id="ov-txt"></div>
      </div>
      <input type="file" id="file-input" accept="video/*">
    </div>

    <div class="transport">
      <button class="tbtn" onclick="skipBy(-10)">&#10216;&#10216;</button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <button class="tbtn" onclick="skipBy(10)">&#10217;&#10217;</button>
      <div class="t-display"><span id="t-cur">0:00</span> / <span id="t-tot">0:00</span></div>
      <div class="vol-row">&#128266; <input type="range" id="vol-range" min="0" max="1" step="0.02" value="1" oninput="video.volume=this.value"></div>
    </div>

    <div class="timeline-panel">
      <div class="tl-tabs">
        <div class="tl-tab active" onclick="switchTab('director')">Director's View</div>
        <div class="tl-tab" onclick="switchTab('cues')">Cue Map</div>
      </div>

      <div class="tracks-wrap" id="tracks-wrap">

        <!-- automation row -->
        <div class="track-row row-automation">
          <div class="track-label">Volume<br>Automation</div>
          <div class="track-canvas-wrap" id="auto-wrap">
            <canvas id="bg-canvas"></canvas>
            <canvas id="auto-canvas"></canvas>
            <canvas id="marker-canvas"></canvas>
          </div>
        </div>

        <!-- waveform row -->
        <div class="track-row row-waveform">
          <div class="track-label">Waveform</div>
          <div class="track-canvas-wrap" id="wf-wrap">
            <canvas id="wf-canvas"></canvas>
            <canvas id="cue-canvas"></canvas>
          </div>
        </div>

        <!-- thumbs row -->
        <div class="track-row row-thumbs">
          <div class="track-label">Frames</div>
          <div style="flex:1;position:relative;height:100%;overflow:hidden;" id="thumb-outer">
            <div id="thumb-strip"></div>
          </div>
        </div>

        <div id="playhead"></div>
      </div>
    </div>

  </div>

  <!-- sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner" id="sb-inner"></div>
  </div>

  <!-- generation panel -->
  <div class="gen-panel" id="gen-panel">
    <div class="gen-panel-inner" id="gen-panel-inner"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── CUE DATA ─────────────────────────────────────────────────────────────
const CUE_DATA = [
  {cue:1,start:"0:00",end:"0:49",duration_seconds:49,name:"Cold Open",filename:"cue_01_cold_open.mp3",
   transcript_snippet:"We're basically about to solve the greatest detective story ever told... the clues are hidden inside you.",
   narrative_beat:"Cold open — two hosts hook the audience. 7-million-year cold case. The big reveal: every person on earth is African.",
   suggested_mood:"tension + intrigue + mystery",
   lyria_prompt:"Tense cinematic thriller opening. Low drone strings, sparse piano stabs, subtle African percussion (talking drum undertone), building slowly. 60 BPM. Dark and mysterious with a sense of ancient time. No melody — just mood and pulse. No brass fanfares, no major-key brightness, no orchestral swells."},
  {cue:2,start:"0:50",end:"1:51",duration_seconds:61,name:"DNA Forensics",filename:"cue_02_dna_forensics.mp3",
   transcript_snippet:"The proof is written in tiny accidental spelling mistakes — mutations piling up in our DNA for millions of years.",
   narrative_beat:"DNA as forensic evidence. Molecular clock introduced. Dense technical information — music must be nearly inaudible here.",
   suggested_mood:"analytical + unsettled + curious",
   lyria_prompt:"Minimalist science-thriller underscore. Sparse electronic textures over plucked strings (pizzicato cello). Steady ticking or clock-like rhythm, 72 BPM. Slightly eerie, like a lab at night. No vocals. No loud percussion. No cinematic climax."},

// ── Background: deep duck zones + grid ───────────────────────────────────
function drawBg() {
  const ctx = bgCanvas.getContext('2d');
  const W = bgCanvas.width, H = bgCanvas.height;
  ctx.clearRect(0,0,W,H);

  // deep duck zones
  DEEP_ZONES.forEach(z=>{
    const x1 = (z.start/totalDur)*W, x2 = (z.end/totalDur)*W;
    ctx.fillStyle = 'rgba(20,20,40,0.7)';
    ctx.fillRect(x1,0,x2-x1,H);
    ctx.fillStyle = 'rgba(80,80,140,0.15)';
    ctx.fillRect(x1,0,x2-x1,H);
    // label
    ctx.fillStyle = 'rgba(100,100,180,0.5)';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.fillText('DEEP DUCK', x1+3, H-4);
  });

  // horizontal grid lines
  [0.25, 0.5, 0.75, 1.0].forEach(v=>{
    const y = H - (v * H * 0.85) - H*0.05;
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.fillText(`${Math.round(v*100)}%`, 2, y-2);
  });

  // 1-minute ruler lines
  for (let m=0; m*60 < totalDur; m++) {
    const x = (m*60/totalDur)*W;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.fillText(`${m}:00`, x+2, 9);
  }
}

// ── Automation curve ──────────────────────────────────────────────────────
function volAtTime(t) {
  if (t <= AUTO_KF[0][0]) return AUTO_KF[0][1];
  for (let i=1; i<AUTO_KF.length; i++) {
    if (t <= AUTO_KF[i][0]) {
      const t0=AUTO_KF[i-1][0], v0=AUTO_KF[i-1][1];
      const t1=AUTO_KF[i][0],   v1=AUTO_KF[i][1];
      const frac = (t-t0)/(t1-t0);
      return v0 + (v1-v0)*frac;
    }
  }
  return AUTO_KF[AUTO_KF.length-1][1];
}

function timeToX(t, W) { return (t/totalDur)*W; }
function volToY(v, H) { return H - (v * H * 0.85) - H*0.05; }
function xToTime(x, W) { return Math.max(0, Math.min(totalDur, (x/W)*totalDur)); }
function yToVol(y, H) { return Math.max(0, Math.min(1, (H - y - H*0.05) / (H*0.85))); }

function drawAuto() {
  const ctx = autoCanvas.getContext('2d');
  const W = autoCanvas.width, H = autoCanvas.height;
  ctx.clearRect(0,0,W,H);

  // filled area under curve
  const playedX = videoLoaded ? timeToX(video.currentTime, W) : 0;

  // draw filled gradient
  ctx.beginPath();
  ctx.moveTo(0, H);
  AUTO_KF.forEach(([t,v])=>{ ctx.lineTo(timeToX(t,W), volToY(v,H)); });
  ctx.lineTo(W, H); ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, 'rgba(200,169,110,0.25)');
  grad.addColorStop(1, 'rgba(200,169,110,0.03)');
  ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.beginPath();
  AUTO_KF.forEach(([t,v],i)=>{
    const x=timeToX(t,W), y=volToY(v,H);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = 'rgba(200,169,110,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // keyframe dots
  AUTO_KF.forEach(([t,v,type], i)=>{
    const x=timeToX(t,W), y=volToY(v,H);
    const colors = {drop:'#ff4466',hook:'#44ddaa',hit:'#ffcc44',trans:'#6688aa',deep:'#334466',swell:'#88aacc'};
    const col = colors[type] || 'rgba(200,169,110,0.6)';
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
  });

  // playhead position indicator on curve
  if (videoLoaded) {
    const cx = timeToX(video.currentTime, W);
    const cv = volAtTime(video.currentTime);
    const cy = volToY(cv, H);
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = 'rgba(200,169,110,0.8)'; ctx.lineWidth=1.5; ctx.stroke();

    // vol readout
    ctx.fillStyle = '#fff';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.fillText(`${Math.round(cv*100)}%`, cx+8, cy-4);
  }
}

// ── Markers: drops, hooks, hit points ────────────────────────────────────
function drawMarkers() {
  const ctx = markerCanvas.getContext('2d');
  const W = markerCanvas.width, H = markerCanvas.height;
  ctx.clearRect(0,0,W,H);

  const typeColor = {drop:'#ff4466', hook:'#44ddaa', hit:'#ffcc44', peak:'#ff8844'};

  HIT_POINTS.forEach(hp=>{
    const x = timeToX(hp.t, W);
    const col = typeColor[hp.type] || '#aaa';

    // vertical marker line
    ctx.strokeStyle = col;
    ctx.globalAlpha = 0.6;
    ctx.lineWidth = 1;
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    ctx.setLineDash([]);

    // triangle marker at top
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x-5,0); ctx.lineTo(x+5,0); ctx.lineTo(x,7); ctx.closePath();
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── Movement boundary lines on wf-canvas and auto-canvas (via cue-canvas) ─
function drawMovements() {
  // Draw on cue-canvas (overlays waveform)
  drawMovementBoundariesOnCanvas(cueCanvas, wfCanvas.width, wfCanvas.height);
  // Draw on marker-canvas (overlays automation)
  drawMovementBoundariesOnCanvas(markerCanvas, markerCanvas.width, markerCanvas.height, true);
}

function drawMovementBoundariesOnCanvas(canvas, W, H, append) {
  const ctx = canvas.getContext('2d');
  if (!append) {
    // cue-canvas is cleared per drawCues; we need to draw after drawCues
    // so this is called after drawCues clears the canvas
  }
  MOVEMENT_BOUNDARIES.forEach(mb => {
    const x = timeToX(mb.t, W);
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = 'rgba(255,255,255,1)';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();

    // label
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#fff';
    ctx.font = '7px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(mb.label, x, 9);
    ctx.textAlign = 'left';
    ctx.restore();
  });
}

// ── Waveform ──────────────────────────────────────────────────────────────
async function extractWf() {
  try {
    const ctx2 = new (window.AudioContext||window.webkitAudioContext)();
    const res = await fetch(video.src);
    const buf = await res.arrayBuffer();
    const dec = await ctx2.decodeAudioData(buf);
    const raw = dec.getChannelData(0);
    const W = wfCanvas.width;
    const step = Math.floor(raw.length/W);
    wfData = new Float32Array(W);
    for(let i=0;i<W;i++){let max=0;for(let j=0;j<step;j++){const v=Math.abs(raw[i*step+j]||0);if(v>max)max=v;}wfData[i]=max;}
    drawWf();
  } catch(e) {
    wfData = new Float32Array(wfCanvas.width).fill(0).map(()=>Math.random()*0.4+0.1);
    drawWf();
  }
}

function drawWf() {
  if(!wfData) return;
  const ctx = wfCanvas.getContext('2d');
  const W = wfCanvas.width, H = wfCanvas.height;
  ctx.clearRect(0,0,W,H);
  const playedX = videoLoaded ? timeToX(video.currentTime,W) : 0;
  for(let x=0;x<W;x++){
    const v=wfData[x]||0;
    const bh=Math.max(2,v*H*0.8);
    const y=(H-bh)/2;
    const t=(x/W)*totalDur;
    const ci=cues.findIndex(c=>t>=c.startSec&&t<c.endSec);
    const col=ci>=0?CUE_COLORS[ci]:'#2a2a3a';
    ctx.globalAlpha = x<=playedX ? 0.8 : 0.3;
    ctx.fillStyle = col;
    ctx.fillRect(x,y,1,bh);
  }
  ctx.globalAlpha=1;
}

// ── Cue regions ───────────────────────────────────────────────────────────
function drawCues() {
  const ctx = cueCanvas.getContext('2d');
  const W = cueCanvas.width, H = cueCanvas.height;
  ctx.clearRect(0,0,W,H);
  const fadeW = W*0.015;

  cues.forEach((c,i)=>{
    const x1=(c.startSec/totalDur)*W, x2=(c.endSec/totalDur)*W;
    const isAct = i===activeCue, isSel = i===selectedCue;

    ctx.globalAlpha = isAct?0.2:isSel?0.15:0.08;
    ctx.fillStyle=c.color; ctx.fillRect(x1,0,x2-x1,H);

    if(i<cues.length-1){
      const g=ctx.createLinearGradient(x2-fadeW,0,x2+fadeW,0);
      g.addColorStop(0,c.color+'55'); g.addColorStop(1,CUE_COLORS[i+1]+'55');
      ctx.globalAlpha=0.4; ctx.fillStyle=g; ctx.fillRect(x2-fadeW,0,fadeW*2,H);
    }
    ctx.globalAlpha=isAct?1:isSel?0.7:0.4;
    ctx.fillStyle=c.color; ctx.fillRect(x1,0,x2-x1,2);

    if(isAct){ ctx.shadowColor=c.color; ctx.shadowBlur=8; ctx.fillRect(x1,0,x2-x1,2); ctx.shadowBlur=0; }

    ctx.globalAlpha=isAct?0.9:0.45;
    ctx.fillStyle='#fff'; ctx.font='500 9px "JetBrains Mono",monospace';
    if(x2-x1>18) ctx.fillText(`${c.cue}`,x1+4,12);
  });
  ctx.globalAlpha=1;

  // Draw movement boundaries on top of cue regions
  drawMovementBoundariesOnCanvas(cueCanvas, W, H, true);
}

// ── Playback ──────────────────────────────────────────────────────────────
function togglePlay(){if(!videoLoaded)return;if(video.paused){video.play();playBtn.textContent='⏸';}else{video.pause();playBtn.textContent='▶';}}
function skipBy(s){if(!videoLoaded)return;video.currentTime=Math.max(0,Math.min(totalDur,video.currentTime+s));}
video.addEventListener('ended',()=>playBtn.textContent='▶');

video.addEventListener('timeupdate',()=>{
  if(!videoLoaded||!totalDur)return;
  const t=video.currentTime;
  tCur.textContent=fmt(t);

  // playhead — offset by track-label width (80px)
  const tW=tracksWrap.clientWidth;
  const tw=tW-80;
  const px=80+((t/totalDur)*tw);
  playhead.style.left=px+'px';

  // active cue
  const ci=cues.findIndex(c=>t>=c.startSec&&t<c.endSec);
  if(ci!==activeCue){
    activeCue=ci;
    drawCues(); drawWf();
    if(ci>=0){ ovDot.style.background=cues[ci].color; ovTxt.textContent=`Cue ${cues[ci].cue} — ${cues[ci].name}`; }
  }
  drawAuto(); // update cursor position on curve
});

// ── Timeline interaction ──────────────────────────────────────────────────
function getTimeFromMouseX(e, wrap) {
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  return xToTime(x, rect.width);
}

// scrub on waveform
wfCanvas.addEventListener('mousedown', e=>{
  if(!videoLoaded)return;
  dragging=true;
  video.currentTime = getTimeFromMouseX(e, wfWrap);
});
document.addEventListener('mousemove', e=>{
  if(dragging && videoLoaded) video.currentTime = getTimeFromMouseX(e, wfWrap);
});
document.addEventListener('mouseup',()=>{dragging=false;dragKfIdx=-1;});

wfCanvas.addEventListener('click', e=>{
  if(!videoLoaded)return;
  const t=getTimeFromMouseX(e,wfWrap);
  const ci=cues.findIndex(c=>t>=c.startSec&&t<c.endSec);
  if(ci>=0){selectedCue=ci;showPanel('cue');openSidebar(ci);drawCues();}
});

// hover tooltip
function handleHover(e, wrap) {
  if(!videoLoaded)return;
  const t = getTimeFromMouseX(e, wrap);
  // hit point nearby?
  const W=wrap.clientWidth;
  const hp=HIT_POINTS.find(h=>Math.abs(h.t-t)<(totalDur*6/W));
  if(hp){
    showTip(e,`<span style="color:${hp.type==='drop'?'#ff4466':hp.type==='peak'?'#ff8844':'#ffcc44'}">${hp.type.toUpperCase()}</span><br>${hp.label}`);
    return;
  }
  const ci=cues.findIndex(c=>t>=c.startSec&&t<c.endSec);
  if(ci>=0){
    const c=cues[ci];
    showTip(e,`<span style="color:${c.color}">Cue ${c.cue} — ${c.name}</span><br><span style="color:var(--text-dim)">${c.suggested_mood}</span><br>${c.start} → ${c.end}`);
  } else hideTip();
}
wfCanvas.addEventListener('mousemove',e=>handleHover(e,wfWrap));
wfCanvas.addEventListener('mouseleave',hideTip);
autoCanvas.addEventListener('mousemove',e=>{
  const rect=autoCanvas.getBoundingClientRect();
  const t=xToTime(e.clientX-rect.left,rect.width);
  const v=volAtTime(t);
  showTip(e,`<span style="color:var(--accent)">${fmt(t)} — ${Math.round(v*100)}% vol</span>`);
  // find nearest kf
  const W=rect.width;
  dragKfIdx=AUTO_KF.findIndex(([kt])=>Math.abs(timeToX(kt,W)-(e.clientX-rect.left))<7);
  autoCanvas.style.cursor=dragKfIdx>=0?'ns-resize':'default';
});
autoCanvas.addEventListener('mouseleave',()=>{hideTip();autoCanvas.style.cursor='default';});
autoCanvas.addEventListener('mousedown',e=>{
  if(dragKfIdx>=0){dragging=true;}
  else {
    // seek
    const rect=autoCanvas.getBoundingClientRect();
    if(videoLoaded)video.currentTime=xToTime(e.clientX-rect.left,rect.width);
  }
});
document.addEventListener('mousemove',e=>{
  if(dragging&&dragKfIdx>=0){
    const rect=autoCanvas.getBoundingClientRect();
    const newV=yToVol(e.clientY-rect.top,rect.height);
    AUTO_KF[dragKfIdx][1]=Math.max(0,Math.min(1,newV));
    drawAuto();
  }
});

function showTip(e,html){tooltip.style.display='block';tooltip.innerHTML=html;tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-8)+'px';}
function hideTip(){tooltip.style.display='none';}

// ── Sidebar ───────────────────────────────────────────────────────────────
function openSidebar(i) {
  const c=cues[i];
  const pct=(c.duration_seconds/totalDur*100).toFixed(1);
  sbInner.innerHTML=`
    <div class="sb-head">
      <div class="sb-badge" style="background:${c.color}22;border:1px solid ${c.color}44;color:${c.color}">${String(c.cue).padStart(2,'0')}</div>
      <div class="sb-title-block">
        <div class="sb-title">${c.name}</div>
        <div class="sb-time">${c.start} → ${c.end} · ${c.duration_seconds}s</div>
      </div>
      <button class="close-btn" onclick="closeSidebar()">&#x2715;</button>
    </div>
    <div class="dur-bar"><div class="dur-fill" style="width:${pct}%;background:${c.color}"></div></div>
    <span class="mood-pill" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}44">${c.suggested_mood}</span>
    <div><div class="sl">Transcript</div><div class="st">"${c.transcript_snippet}"</div></div>
    <div><div class="sl">Director's Note</div><div class="st-em">${c.narrative_beat}</div></div>
    <div class="lyria-box">
      <div class="lyria-top">
        <div class="sl" style="margin:0">Lyria Prompt</div>
        <button class="copy-btn" id="cpbtn-${i}" onclick="copyPr(${i})">Copy</button>
      </div>
      <textarea class="lyria-ta" id="pr-${i}">${c.lyria_prompt}</textarea>
    </div>
  `;
  sidebar.classList.add('open');
}
function closeSidebar(){sidebar.classList.remove('open');selectedCue=-1;drawCues();}
function copyPr(i){
  const ta=document.getElementById(`pr-${i}`);
  navigator.clipboard.writeText(ta.value).then(()=>{
    const b=document.getElementById(`cpbtn-${i}`);b.textContent='Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1800);
  });
}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('.tl-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase().includes(name.substring(0,3))));
}

// ── Export ────────────────────────────────────────────────────────────────
function exportAll(){
  const out={
    cue_sheet:cues.map((c,i)=>{const ta=document.getElementById(`pr-${i}`);return{...CUE_DATA[i],lyria_prompt:ta?ta.value:c.lyria_prompt};}),
    automation_keyframes:AUTO_KF.map(([t,v,type,label])=>({time_sec:t,time_fmt:fmt(t),volume_pct:Math.round(v*100),type,label})),
    hit_points:HIT_POINTS,
    deep_duck_zones:DEEP_ZONES
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='score_direction.json';a.click();
}

// ── Init preview (before video load) ─────────────────────────────────────
(function init(){
  resize();
  // fake waveform
  wfData = new Float32Array(wfCanvas.width).fill(0).map((_,i)=>0.2+0.25*Math.sin(i*0.06)+0.15*Math.sin(i*0.19));
  drawAll();

  // placeholder thumbs
  const count=28, W=document.getElementById('thumb-outer').clientWidth||700;
  const fw=Math.floor(W/count);
  thumbStrip.innerHTML='';
  for(let i=0;i<count;i++){
    const t=(i/count)*totalDur;
    const ci=cues.findIndex(c=>t>=c.startSec&&t<c.endSec);
    const f=document.createElement('div');
    f.className='thumb-frame'; f.style.width=fw+'px';
    f.style.background=ci>=0?CUE_COLORS[ci]+'18':'#0c0c14';
    const ts=document.createElement('div');ts.className='thumb-time';ts.textContent=fmt(t);
    f.appendChild(ts); thumbStrip.appendChild(f);
  }
})();

async function buildThumbs(){
  const count=28,W=document.getElementById('thumb-outer').clientWidth||700;
  const fw=Math.floor(W/count);
  thumbStrip.innerHTML='';
  for(let i=0;i<count;i++){
    const t=(i/count)*totalDur;
    const f=document.createElement('div');f.className='thumb-frame';f.style.width=fw+'px';
    const c=document.createElement('canvas');c.width=fw;c.height=62;f.appendChild(c);
    const ts=document.createElement('div');ts.className='thumb-time';ts.textContent=fmt(t);f.appendChild(ts);
    f.addEventListener('click',()=>{video.currentTime=t;});
    thumbStrip.appendChild(f);
    // capture
    const tv=document.createElement('video');
    tv.src=video.src;tv.preload='metadata';tv.muted=true;
    tv.addEventListener('loadeddata',()=>{tv.currentTime=t;},{once:true});
    tv.addEventListener('seeked',()=>{c.getContext('2d').drawImage(tv,0,0,fw,62);tv.src='';},{once:true});
    tv.load();
  }
}
</script>
